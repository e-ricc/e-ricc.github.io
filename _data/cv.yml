  name: Ester Riccardi
  label: PhD student in Computational Neuroscience
  email: ester.riccardi@unitn.it
  location: Trento, Italy
  image: "assets/img/prof_pic.jpg" # Optional: filename in assets/img/
  summary: Write a 2-3 line professional summary here.
  # Social links used by CV page
  social_networks:
    - network: GitHub
      username: your-username
    - network: LinkedIn
      username: your-linkedin-handle

  # Optional postal address
  address:
    street: Your Street Address
    city: Your City
    region: Your Region/State
    postalCode: Your ZIP/Postal Code
    countryCode: IT # ISO country code (e.g., IT, US, DE)

  sections:
    Education:
      - institution: Your University
        location: City, Country
        url: 
