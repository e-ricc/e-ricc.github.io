        studyType: Degree Type
        start_date: 2020
        end_date: 2024
        score: ""
        courses: "Relevant courses"
        highlights:
          - Key achievement or thesis topic.

    Experience:
      - company: Organization Name
        position: Job Title
        location: City, Country
        start_date: 2024
        end_date: present
        summary: One-line role summary.
        highlights:
          - Impact/result #1.
          - Impact/result #2.

    Publications:
      - title: Your Publication Title
        authors:
          - Your Name
          - Coauthor Name
        publisher: Venue / Journal / Conference
        releaseDate: 2025-01-01
        url: 
